name = "pacioli-app"
pages_build_output_dir = "dist"

[vars]
NODE_ENV = "production"

[[d1_databases]]
binding = "DB"
database_name = "pacioli-db"
database_id = "d1-database-id-placeholder"
migrations_dir = "drizzle"

[compatibility]
compatibility_date = "2024-03-01"
compatibility_flags = [ "nodejs_compat" ]
